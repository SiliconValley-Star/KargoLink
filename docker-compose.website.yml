version: '3.8'

services:
  # =====================================================
  # NGINX REVERSE PROXY WITH SSL
  # =====================================================
  nginx:
    image: nginx:alpine
    container_name: cargolink-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./docker/nginx/sites:/etc/nginx/sites-available
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - website
      - backend
    restart: unless-stopped
    networks:
      - cargolink-network

  # =====================================================
  # WEBSITE (NEXT.JS)
  # =====================================================
  website:
    build:
      context: ./packages/website
      dockerfile: Dockerfile.prod
      args:
        - NODE_ENV=production
    container_name: cargolink-website
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=https://api.cargolink.com
      - NEXT_PUBLIC_WS_URL=wss://api.cargolink.com
      - NEXT_PUBLIC_SITE_URL=https://cargolink.com
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_GOOGLE_ANALYTICS_ID=${GA_TRACKING_ID}
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - cargolink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =====================================================
  # BACKEND API
  # =====================================================
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: cargolink-backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - IYZICO_API_KEY=${IYZICO_API_KEY}
      - IYZICO_SECRET_KEY=${IYZICO_SECRET_KEY}
      - PAYTR_MERCHANT_ID=${PAYTR_MERCHANT_ID}
      - PAYTR_MERCHANT_KEY=${PAYTR_MERCHANT_KEY}
      - PAYTR_MERCHANT_SALT=${PAYTR_MERCHANT_SALT}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
    expose:
      - "3001"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - cargolink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =====================================================
  # ADMIN PANEL
  # =====================================================
  admin:
    build:
      context: ./packages/admin
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: cargolink-admin
    environment:
      - NODE_ENV=production
      - PORT=3002
      - REACT_APP_API_URL=https://api.cargolink.com
      - REACT_APP_WS_URL=wss://api.cargolink.com
    expose:
      - "3002"
    restart: unless-stopped
    networks:
      - cargolink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =====================================================
  # DATABASE
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: cargolink-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - /var/log/postgresql:/var/log/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - cargolink-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # REDIS CACHE
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: cargolink-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/etc/redis/redis.conf
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - cargolink-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # =====================================================
  # MONITORING - PROMETHEUS
  # =====================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: cargolink-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./docker/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - cargolink-network

  # =====================================================
  # MONITORING - GRAFANA
  # =====================================================
  grafana:
    image: grafana/grafana:latest
    container_name: cargolink-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST}:${SMTP_PORT}
      - GF_SMTP_USER=${SMTP_USER}
      - GF_SMTP_PASSWORD=${SMTP_PASS}
      - GF_SMTP_FROM_ADDRESS=${EMAIL_FROM}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - cargolink-network

  # =====================================================
  # LOG AGGREGATION - LOKI
  # =====================================================
  loki:
    image: grafana/loki:latest
    container_name: cargolink-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - cargolink-network

  # =====================================================
  # LOG COLLECTION - PROMTAIL
  # =====================================================
  promtail:
    image: grafana/promtail:latest
    container_name: cargolink-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - cargolink-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  cargolink-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16