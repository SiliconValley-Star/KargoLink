name: 🔄 Dependency Updates

on:
  schedule:
    - cron: '0 2 * * 1' # Her Pazartesi saat 02:00
  workflow_dispatch:

jobs:
  update-dependencies:
    name: 🔄 Update Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: 📦 Update Dependencies
        run: |
          npm update
          cd packages/backend && npm update
          cd ../admin && npm update
          cd ../mobile && npm update
          cd ../website && npm update
          cd ../shared && npm update

      - name: 🧪 Run Tests
        run: |
          npm test
        continue-on-error: true

      - name: 📝 Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: '🔄 Automated Dependency Updates'
          body: |
            ## 🔄 Automated Dependency Updates
            
            Bu PR, haftalık otomatik dependency güncellemelerini içerir.
            
            ### 🔍 Yapılan İşlemler:
            - 📦 Tüm npm paketleri güncellendi
            - 🧪 Temel testler çalıştırıldı
            - 🔍 Güvenlik taraması yapıldı
            
            ### ⚠️ Dikkat Edilmesi Gerekenler:
            - Breaking changes için CHANGELOG dosyalarını kontrol edin
            - Test coverage'ını kontrol edin
            - Production deployment öncesi staging'de test edin
            
            **Auto-generated by GitHub Actions**
          branch: dependency-updates
          delete-branch: true