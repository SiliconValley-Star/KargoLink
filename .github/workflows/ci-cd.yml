name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =====================================================
  # DEPENDENCY & SECURITY CHECKS
  # =====================================================
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Run Security Audit
        run: npm audit --audit-level high

      - name: 🛡️ Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium
        continue-on-error: true

  # =====================================================
  # CODE QUALITY & LINTING
  # =====================================================
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎯 ESLint Check
        run: npm run lint

      - name: 🎨 Prettier Check
        run: npm run format:check

      - name: 📝 TypeScript Check
        run: npm run type-check

      - name: 📊 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  # =====================================================
  # BACKEND TESTING
  # =====================================================
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cargolink_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🗄️ Setup Test Database
        run: |
          cd packages/backend
          npm run prisma:generate
          npm run prisma:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cargolink_test
          JWT_SECRET: test-jwt-secret-key-for-testing-32-characters-minimum
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-testing-32-characters-min

      - name: 🧪 Run Backend Tests
        run: |
          cd packages/backend
          npm run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cargolink_test
          JWT_SECRET: test-jwt-secret-key-for-testing-32-characters-minimum
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-testing-32-characters-min
          REDIS_URL: redis://localhost:6379/1
          NODE_ENV: test

      - name: 📊 Upload Coverage Reports
        uses: codecov/codecov-action@v3
        with:
          file: ./packages/backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  # =====================================================
  # FRONTEND TESTING
  # =====================================================
  test-frontend:
    name: 🎨 Frontend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [website, admin, mobile]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Run ${{ matrix.package }} Tests
        run: |
          cd packages/${{ matrix.package }}
          npm run test:coverage
        continue-on-error: ${{ matrix.package == 'mobile' }}

      - name: 📊 Upload Coverage Reports
        uses: codecov/codecov-action@v3
        with:
          file: ./packages/${{ matrix.package }}/coverage/lcov.info
          flags: ${{ matrix.package }}
          name: ${{ matrix.package }}-coverage
          fail_ci_if_error: false

  # =====================================================
  # E2E TESTING
  # =====================================================
  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Install Playwright
        run: npx playwright install --with-deps

      - name: 🚀 Run E2E Tests
        run: npm run test:e2e
        continue-on-error: true

      - name: 📸 Upload Playwright Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # =====================================================
  # BUILD & CONTAINERIZE
  # =====================================================
  build:
    name: 🏗️ Build & Containerize
    runs-on: ubuntu-latest
    needs: [security-audit, code-quality, test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build and Push Backend Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: 🏗️ Build Website
        run: |
          cd packages/website
          npm run build
          
      - name: 🏗️ Build Admin Panel  
        run: |
          cd packages/admin
          npm run build

  # =====================================================
  # STAGING DEPLOYMENT
  # =====================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.cargolink.com

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Image: ${{ needs.build.outputs.image-tags }}"
          # Add staging deployment logic here
          
      - name: 🔍 Run Health Checks
        run: |
          echo "🔍 Running staging health checks..."
          # Add health check logic here

      - name: 📬 Notify Slack
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'Staging deployment ${{ job.status }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =====================================================
  # PRODUCTION DEPLOYMENT
  # =====================================================
  deploy-production:
    name: 🌟 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://cargolink.com

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛡️ Security Sign-off
        run: |
          echo "🛡️ Security team approval required for production deployment"
          
      - name: 🚀 Deploy to Production
        run: |
          echo "🚀 Deploying to production environment..."
          echo "Image: ${{ needs.build.outputs.image-tags }}"
          # Add production deployment logic here
          
      - name: 🔍 Run Production Health Checks
        run: |
          echo "🔍 Running production health checks..."
          # Add comprehensive health checks
          
      - name: 📊 Update Monitoring
        run: |
          echo "📊 Updating production monitoring dashboards..."
          # Add monitoring update logic
          
      - name: 📬 Notify Team
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#production'
          text: '🌟 Production deployment ${{ job.status }} - ${{ github.sha }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =====================================================
  # POST-DEPLOYMENT MONITORING
  # =====================================================
  post-deploy-monitoring:
    name: 📊 Post-Deploy Monitoring
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: success() && github.ref == 'refs/heads/main'

    steps:
      - name: 📈 Trigger Monitoring Alerts
        run: |
          echo "📈 Setting up post-deployment monitoring..."
          # Add monitoring setup logic
          
      - name: 🎯 Run Smoke Tests
        run: |
          echo "🎯 Running production smoke tests..."
          # Add smoke test logic
          
      - name: 📝 Update Release Notes
        run: |
          echo "📝 Updating release documentation..."
          # Add release notes update logic