# Production overrides for docker-compose.yml
version: '3.8'

services:
  # PostgreSQL Database - Production
  postgres:
    environment:
      POSTGRES_DB: cargolink_prod
      POSTGRES_USER: ${DB_USER:-cargolink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # Redis Cache - Production
  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'

  # Backend API - Production
  backend:
    build:
      target: production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-cargolink}:${POSTGRES_PASSWORD}@postgres:5432/cargolink_prod
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      LOG_LEVEL: info
      ENABLE_SWAGGER: "false"
      ENABLE_SEEDING: "false"
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
      replicas: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Admin Panel - Production
  admin:
    build:
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.cargolink.com.tr}
        VITE_APP_NAME: "CargoLink Admin"
        VITE_APP_VERSION: ${APP_VERSION:-1.0.0}
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'
      replicas: 2

  # Nginx Load Balancer - Production
  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_prod_logs:/var/log/nginx
    environment:
      - NGINX_ENVSUBST_TEMPLATE_SUFFIX=.template
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
      replicas: 1

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: cargolink-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - cargolink-network
    profiles:
      - monitoring

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: cargolink-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    networks:
      - cargolink-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # Log Management - Loki
  loki:
    image: grafana/loki:latest
    container_name: cargolink-loki
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - cargolink-network
    profiles:
      - monitoring

  # Log Collection - Promtail
  promtail:
    image: grafana/promtail:latest
    container_name: cargolink-promtail
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/promtail.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - nginx_prod_logs:/var/log/nginx:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - cargolink-network
    depends_on:
      - loki
    profiles:
      - monitoring

  # Backup Service
  backup:
    image: postgres:15-alpine
    container_name: cargolink-backup
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./docker/scripts/backup.sh:/usr/local/bin/backup.sh:ro
    command: /bin/sh -c "chmod +x /usr/local/bin/backup.sh && /usr/local/bin/backup.sh"
    networks:
      - cargolink-network
    depends_on:
      - postgres
    profiles:
      - backup

volumes:
  postgres_prod_data:
    driver: local
    name: cargolink-postgres-prod-data
  redis_prod_data:
    driver: local
    name: cargolink-redis-prod-data
  nginx_prod_logs:
    driver: local
    name: cargolink-nginx-prod-logs
  prometheus_data:
    driver: local
    name: cargolink-prometheus-data
  grafana_data:
    driver: local
    name: cargolink-grafana-data
  loki_data:
    driver: local
    name: cargolink-loki-data