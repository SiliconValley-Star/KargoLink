# =====================================================
# CARGOLINK.COM - MAIN WEBSITE
# =====================================================
server {
    listen 80;
    server_name cargolink.com www.cargolink.com;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cargolink.com www.cargolink.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/cargolink.com.crt;
    ssl_certificate_key /etc/nginx/ssl/cargolink.com.key;

    # Security headers specific to main site
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Root and index
    root /var/www/html;
    index index.html;

    # Main website (Next.js)
    location / {
        limit_req zone=general burst=20 nodelay;
        
        proxy_pass http://website:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Next.js static files with aggressive caching
    location /_next/static {
        proxy_pass http://website:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }

    # API health check
    location /api/health {
        proxy_pass http://website:3000;
        access_log off;
    }

    # Robots.txt
    location = /robots.txt {
        proxy_pass http://website:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Sitemap
    location = /sitemap.xml {
        proxy_pass http://website:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Favicon and assets with long caching
    location ~* \.(ico|jpg|jpeg|png|gif|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://website:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # CSS and JS with versioning
    location ~* \.(css|js)$ {
        proxy_pass http://website:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }
}

# =====================================================
# API.CARGOLINK.COM - BACKEND API
# =====================================================
server {
    listen 80;
    server_name api.cargolink.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.cargolink.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/api.cargolink.com.crt;
    ssl_certificate_key /etc/nginx/ssl/api.cargolink.com.key;

    # API rate limiting
    location /api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://backend:3001;
        include /etc/nginx/proxy_params;
    }

    location /api/v1 {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://backend:3001;
        include /etc/nginx/proxy_params;
    }

    # WebSocket support for real-time features
    location /socket.io/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://backend:3001;
        access_log off;
    }

    # Metrics endpoint (restricted access)
    location /metrics {
        allow 172.20.0.0/16;  # Docker network
        allow 127.0.0.1;      # Localhost
        deny all;
        
        proxy_pass http://backend:3001;
        access_log off;
    }
}

# =====================================================
# ADMIN.CARGOLINK.COM - ADMIN PANEL
# =====================================================
server {
    listen 80;
    server_name admin.cargolink.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.cargolink.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/admin.cargolink.com.crt;
    ssl_certificate_key /etc/nginx/ssl/admin.cargolink.com.key;

    # Admin panel access control
    location / {
        # IP-based access control (uncomment and customize for production)
        # allow 192.168.1.0/24;  # Office network
        # allow 10.0.0.0/8;      # VPN network
        # deny all;

        limit_req zone=general burst=10 nodelay;
        
        proxy_pass http://admin:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets
    location /static {
        proxy_pass http://admin:3002;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

