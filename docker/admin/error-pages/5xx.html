<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunucu Hatası - CargoLink Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fc466b 0%, #3f5efb 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .error-container {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #fc466b;
            line-height: 1;
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        
        .error-message {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #fc466b;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: background 0.3s;
            margin-right: 10px;
        }
        
        .btn:hover {
            background: #e73c62;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 30px;
            background: #fc466b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        
        .refresh-info {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="logo">CL</div>
        <div class="error-code">5XX</div>
        <h1 class="error-title">Sunucu Hatası</h1>
        <p class="error-message">
            Üzgünüz, sunucumuzda bir hata oluştu. Teknik ekibimiz durumdan haberdar edildi 
            ve en kısa sürede sorunu çözmeye çalışıyor.
        </p>
        <a href="javascript:location.reload()" class="btn">Sayfayı Yenile</a>
        <a href="/" class="btn btn-secondary">Ana Sayfa</a>
        <div class="refresh-info">
            Sayfa 30 saniye sonra otomatik olarak yenilenecek.
        </div>
    </div>
    
    <script>
        // Auto refresh after 30 seconds
        setTimeout(() => {
            location.reload();
        }, 30000);
    </script>
</body>
</html>
